[theme]
# Base dark theme
base="dark"

# Horus Subdued Gold/Amber for primary accents (buttons, focus)
primaryColor="#D4AF37"

# Deep black background for the OSINT Terminal feel
backgroundColor="#050505"

# Slightly lighter dark gray for chat message backgrounds and sidebars
secondaryBackgroundColor="#111111"

# Cyber Green for all text to simulate terminal output
textColor="#00FF41"

# Monospace font to enforce the intelligence report look
font="monospace"